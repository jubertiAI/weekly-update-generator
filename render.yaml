services:
  - type: cron
    name: flight-tracker-eze-paris
    runtime: python
    schedule: "0 11,14,18,0 * * *"  # 4x/day: 8am, 11am, 3pm, 9pm ART (UTC-3)
    buildCommand: pip install -r requirements.txt
    startCommand: python tracker.py
    envVars:
      - key: SERPAPI_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
